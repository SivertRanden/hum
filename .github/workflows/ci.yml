name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build (${{ matrix.db }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - db: sqlite
            database_url: ""
          - db: postgresql
            database_url: "postgres://hum:hum@localhost:5432/hum"

    services:
      postgres:
        image: ${{ matrix.db == 'postgresql' && 'postgres:16-alpine' || '' }}
        env:
          POSTGRES_USER: hum
          POSTGRES_PASSWORD: hum
          POSTGRES_DB: hum
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: ${{ matrix.database_url }}

      - name: Check migrations (PostgreSQL)
        if: matrix.db == 'postgresql'
        run: pnpm --filter @hum/server db:migrate
        env:
          DATABASE_URL: ${{ matrix.database_url }}
