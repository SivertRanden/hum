services:
  backend:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_PATH: /data/hum.db
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost}
    volumes:
      - hum_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    ports:
      - "${PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  hum_data:
